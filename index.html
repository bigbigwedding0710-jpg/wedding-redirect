<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Thomas & Rainkie Wedding Photos</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fdfaf5;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.9);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(184,90,83,0.12);
      border: 1px solid #f0e0c0;
      overflow: hidden;
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      background: linear-gradient(135deg, rgba(232,165,160,0.18), rgba(138,171,138,0.10));
      padding: 32px 24px 22px;
      text-align: center;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      color: #b85a53;
      line-height: 1.1;
    }

    .title-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 26px;
      color: #d4756e;
      margin-top: 4px;
    }

    .title-chinese {
      font-size: 15px;
      color: #4f6b4f;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
    }
    .divider span {
      flex: 1;
      height: 1px;
      background: rgba(232,165,160,0.4);
    }
    .divider i {
      color: #e8a5a0;
      font-style: normal;
    }

    .body {
      padding: 28px 24px;
      text-align: center;
    }

    .instruction {
      font-size: 15px;
      color: #4a4a4a;
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .instruction-chinese {
      font-size: 14px;
      color: #6b8f6b;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .upload-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #d4756e;
      color: white;
      border: none;
      border-radius: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(212,117,110,0.35);
      margin-bottom: 12px;
    }
