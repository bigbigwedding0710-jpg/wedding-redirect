<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thomas and Rainkie Wedding</title>
<style>
body {
  margin: 0;
  padding: 20px;
  min-height: 100vh;
  background: #fdfaf5;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  width: 100%;
  max-width: 400px;
  background: white;
  border-radius: 20px;
  padding: 40px 24px;
  box-shadow: 0 10px 40px rgba(180,80,80,0.12);
  text-align: center;
}
.title {
  font-size: 32px;
  color: #b85a53;
  margin: 0 0 8px;
}
.subtitle {
  font-size: 18px;
  color: #d4756e;
  font-style: italic;
  margin: 0 0 8px;
}
.chinese {
  font-size: 15px;
  color: #4f6b4f;
  margin: 0 0 24px;
}
.divider {
  border: none;
  border-top: 1px solid #f0d0cc;
  margin: 20px 0;
}
.instruction {
  font-size: 14px;
  color: #666;
  margin: 0 0 6px;
}
.instruction-cn {
  font-size: 14px;
  color: #6b8f6b;
  margin: 0 0 24px;
}
.btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: #d4756e;
  color: white;
  border-radius: 14px;
  font-size: 16px;
  font-weight: bold;
  text-decoration: none;
  margin-bottom: 16px;
}
.hint {
  font-size: 12px;
  color: #aaa;
  line-height: 1.6;
}
.footer {
  margin-top: 24px;
  font-size: 13px;
  color: #ccc;
  font-style: italic;
}
</style>
</head>
<body>
<div class="card">
  <p class="title">Thomas & Rainkie</p>
  <p class="subtitle">Share a Memory</p>
  <p class="chinese">分享美好回憶 💕</p>
  <hr class="divider">
  <p class="instruction">Tap below to upload your photos</p>
  <p class="instruction-cn">點擊下方上載你的照片 📷</p>
  <a href="https://tinyurl.com/ThomasnRainkie" class="btn">
    📷 Upload Photos · 上載照片
  </a>
  <p class="hint">
    iPhone users: please open in Chrome<br>
    iPhone用戶：請用Chrome開啟
  </p>
  <p class="footer">with love · 愛你們 ✦</p>
</div>
</body>
</html>
